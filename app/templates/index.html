<!DOCTYPE html>
<html>
<head>
<title>Register Order</title>
</head>

<body>

<h2>Register Order</h2>

<form method="POST">

<label>Order ID</label><br>
<input type="text" name="order_id" required><br><br>

<label>Customer ID</label><br>
<input type="text" name="customer_id" required><br><br>

<label>SKU</label><br>
<input type="text" name="sku" required><br><br>

<label>Quantity</label><br>
<input type="number" name="quantity" min="1" required><br><br>

<label>Unit Price</label><br>
<input type="number" step="0.01" name="unit_price" required><br><br>

<label>Order Date</label><br>
<input type="date" name="order_date" required><br><br>

<label>Channel</label><br>
<input type="text" name="channel" required><br><br>

<button type="submit">Save Order</button>

</form>

</body>
</html>
